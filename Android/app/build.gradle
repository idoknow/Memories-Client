plugins {
    id 'com.android.application'
}

android {
    namespace 'com.mrcwoods.memories'
    compileSdk 35

    signingConfigs {
        release {
            storeFile file('../memories-release.jks')
            storePassword 'memories123'
            keyAlias 'memories'
            keyPassword 'memories123'
        }
    }

    defaultConfig {
        applicationId 'com.mrcwoods.memories'
        minSdk 23
        targetSdk 35
        versionCode 2
        versionName '1.1.0'
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}