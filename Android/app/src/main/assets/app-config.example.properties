# Fill this file, then save a copy as app-config.properties before building.

app.name=Memories
app.schoolName=Your School
app.developerName=Your Name
app.developerAvatarUrl=https://example.com/avatar.webp
app.websiteUrl=https://example.com
app.updateDate=2026-07-02

api.memoriesBase=https://memories-api.example.com
api.imageHost=https://img.example.com/api/v1.php

oauth.issuer=https://kg.campux.top
oauth.authorizeUrl=https://kg.campux.top/oauth/authorize
oauth.tokenUrl=https://kg.campux.top/oauth/token
oauth.userInfoUrl=https://kg.campux.top/oauth/userinfo
oauth.revokeUrl=https://kg.campux.top/oauth/revoke
oauth.introspectUrl=https://kg.campux.top/oauth/introspect
oauth.clientId=YOUR_CLIENT_ID
oauth.clientSecret=YOUR_CLIENT_SECRET
oauth.redirectUri=http://localhost:2580
oauth.scope=profile
oauth.callbackPort=2580

upload.defaultOutputFormat=auto
upload.storageDestination=telegram
upload.cdnDomain=default

rateLimit.windowMs=5000
rateLimit.maxItems=5

